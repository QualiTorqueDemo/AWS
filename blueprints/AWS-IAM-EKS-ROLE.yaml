spec_version: 2
description: |
  Creates an IAM role that can be assumed by one or more EKS ServiceAccount in one or more EKS clusters. 
  Unlike iam-assumable-role-with-oidc, this module:

  - Does not require any knowledge of cluster OIDC information as data resources are used
  - Supports assuming the role from multiple EKS clusters, for example used in DR or when a workload is spread across clusters
  - Support multiple ServiceAccount in the same cluster, for example when a workload runs in multiple namespaces
  - More suitable for non-cluster admins as implementation is simpler
  - More suitable for when the IAM role and cluster resources are in separate Terraform configurations
  - Does not support multiple regions, consider using iam-role-for-service-accounts-eks if role needs to support clusters in multiple regions
  - This module is for use with AWS EKS. For details of how a ServiceAccount in EKS can assume an IAM role, see the EKS documentation.

  Notes:
  - The EKS cluster needs to exist first, in the current AWS account and region
  - The key in the cluster_service_accounts is the exact name of the EKS cluster
metadata:
  blueprint-labels:
    - key: hypervisor
      value: AWS
    - key: category
      value: Cloud
    - key: Terraform
inputs:
  allow_self_assume_role:
    type: string
    description: Determines whether to allow the role to be [assume itself](https://aws.amazon.com/blogs/security/announcing-an-update-to-iam-role-trust-policy-behavior/)
  assume_role_condition_test:
    type: string
    default: StringEquals
    description: Name of the [IAM condition operator](https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_elements_condition_operators.html) to evaluate when assuming the role
  cluster_service_accounts:
    type: string
    default: '{}'
    description: EKS cluster and k8s ServiceAccount pairs. Each EKS cluster can have multiple k8s ServiceAccount. See README for details
  create_role:
    type: string
    default: true
    description: Whether to create a role
  force_detach_policies:
    type: string
    description: Whether policies should be detached from this role when destroying
  max_session_duration:
    type: string
    default: 43200
    description: Maximum CLI/API session duration in seconds between 3600 and 43200
  role_description:
    type: string
    description: IAM Role description
  role_name:
    type: string
    default: 'null'
    description: Name of IAM role
  role_name_prefix:
    type: string
    default: 'null'
    description: IAM role name prefix
  role_path:
    type: string
    default: /
    description: Path of IAM role
  role_permissions_boundary_arn:
    type: string
    description: Permissions boundary ARN to use for IAM role
  role_policy_arns:
    type: string
    default: '{}'
    description: ARNs of any policies to attach to the IAM role
  agent:
    type: agent
outputs:
  iam-eks-role_iam_role_arn:
    value: '{{ .grains.iam-eks-role.outputs.iam_role_arn }}'
    quick: true
  iam-eks-role_iam_role_name:
    value: '{{ .grains.iam-eks-role.outputs.iam_role_name }}'
    quick: true
  iam-eks-role_iam_role_path:
    value: '{{ .grains.iam-eks-role.outputs.iam_role_path }}'
    quick: true
  iam-eks-role_iam_role_unique_id:
    value: '{{ .grains.iam-eks-role.outputs.iam_role_unique_id }}'
    quick: true
grains:
  iam-eks-role:
    kind: terraform
    spec:
      source:
        store: AWS
        path: assets/terraform-aws-iam-eks-role
      agent:
        name: '{{ .inputs.agent }}'
      env-vars: []
      version: 1.5.5
      inputs:
        - allow_self_assume_role: '{{ .inputs.allow_self_assume_role }}'
        - assume_role_condition_test: '{{ .inputs.assume_role_condition_test }}'
        - cluster_service_accounts: '{{ .inputs.cluster_service_accounts }}'
        - create_role: '{{ .inputs.create_role }}'
        - force_detach_policies: '{{ .inputs.force_detach_policies }}'
        - max_session_duration: '{{ .inputs.max_session_duration }}'
        - role_description: '{{ .inputs.role_description }}'
        - role_name: '{{ .inputs.role_name }}'
        - role_name_prefix: '{{ .inputs.role_name_prefix }}'
        - role_path: '{{ .inputs.role_path }}'
        - role_permissions_boundary_arn: '{{ .inputs.role_permissions_boundary_arn }}'
        - role_policy_arns: '{{ .inputs.role_policy_arns }}'
        - tags: '{}'
      outputs:
        - iam_role_arn
        - iam_role_name
        - iam_role_path
        - iam_role_unique_id
