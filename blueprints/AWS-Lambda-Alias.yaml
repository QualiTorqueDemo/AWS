spec_version: 2
description: |
  Terraform module, which creates Lambda alias as well as takes care of async event configuration and Lambda permissions for alias.
  Lambda Alias is required to do complex Lambda deployments, eg. using external tools like AWS CodeDeploy.
  This Terraform module is the part of serverless.tf framework, which aims to simplify all operations when working with the serverless in Terraform.
inputs:
  name:
    type: string
    description: Name for the alias you are creating.
  function_name:
    type: string
    description: The function ARN of the Lambda function for which you want to create an alias.
  function_version:
    type: string
    default: $LATEST
    pattern: ($LATEST|[0-9]+).
    validation-description: 'Pattern: ($LATEST|[0-9]+).'
    description: 'Lambda function version for which you are creating the alias. Pattern: ($LATEST|[0-9]+).'
  allowed_triggers:
    type: string
    default: '{}'
    description: Map of allowed triggers to create Lambda permissions
  create:
    type: string
    default: true
    description: Controls whether resources should be created
  create_async_event_config:
    type: string
    description: Controls whether async event configuration for Lambda Function/Alias should be created
  create_qualified_alias_allowed_triggers:
    type: string
    default: true
    description: Whether to allow triggers on qualified alias
  create_qualified_alias_async_event_config:
    type: string
    default: true
    description: Whether to allow async event configuration on qualified alias
  create_version_allowed_triggers:
    type: string
    default: true
    description: Whether to allow triggers on version of Lambda Function used by alias (this will revoke permissions from previous version because Terraform manages only current resources)
  create_version_async_event_config:
    type: string
    default: true
    description: Whether to allow async event configuration on version of Lambda Function used by alias (this will revoke permissions from previous version because Terraform manages only current resources)
  destination_on_failure:
    type: string
    default: 'null'
    description: Amazon Resource Name (ARN) of the destination resource for failed asynchronous invocations
  destination_on_success:
    type: string
    default: 'null'
    description: Amazon Resource Name (ARN) of the destination resource for successful asynchronous invocations
  event_source_mapping:
    type: string
    default: '{}'
    description: Map of event source mapping
  maximum_event_age_in_seconds:
    type: string
    default: 'null'
    description: Maximum age of a request that Lambda sends to a function for processing in seconds. Valid values between 60 and 21600.
  maximum_retry_attempts:
    type: string
    default: 'null'
    description: Maximum number of times to retry when the function returns an error. Valid values between 0 and 2. Defaults to 2.
  refresh_alias:
    type: string
    default: true
    description: Whether to refresh function version used in the alias. Useful when using this module together with external tool do deployments (eg, AWS CodeDeploy).
  routing_additional_version_weights:
    type: string
    default: '{}'
    description: A map that defines the proportion of events that should be sent to different versions of a lambda function.
  use_existing_alias:
    type: string
    description: Whether to manage existing alias instead of creating a new one. Useful when using this module together with external tool do deployments (eg, AWS CodeDeploy).
  agent:
    type: agent
  description:
    type: string
    description: Description of the alias.
outputs:
  alias_lambda_alias_arn:
    value: '{{ .grains.alias.outputs.lambda_alias_arn }}'
    quick: true
  alias_lambda_alias_description:
    value: '{{ .grains.alias.outputs.lambda_alias_description }}'
    quick: true
  alias_lambda_alias_event_source_mapping_function_arn:
    value: '{{ .grains.alias.outputs.lambda_alias_event_source_mapping_function_arn }}'
    quick: true
  alias_lambda_alias_event_source_mapping_state:
    value: '{{ .grains.alias.outputs.lambda_alias_event_source_mapping_state }}'
    quick: true
  alias_lambda_alias_event_source_mapping_state_transition_reason:
    value: '{{ .grains.alias.outputs.lambda_alias_event_source_mapping_state_transition_reason }}'
    quick: true
  alias_lambda_alias_event_source_mapping_uuid:
    value: '{{ .grains.alias.outputs.lambda_alias_event_source_mapping_uuid }}'
    quick: true
  alias_lambda_alias_function_version:
    value: '{{ .grains.alias.outputs.lambda_alias_function_version }}'
    quick: true
  alias_lambda_alias_invoke_arn:
    value: '{{ .grains.alias.outputs.lambda_alias_invoke_arn }}'
    quick: true
  alias_lambda_alias_name:
    value: '{{ .grains.alias.outputs.lambda_alias_name }}'
    quick: true
grains:
  alias:
    kind: terraform
    spec:
      source:
        path: AWS/assets/terraform-aws-lambda-alias
      agent:
        name: '{{ .inputs.agent }}'
      env-vars: []
      version: 1.5.5
      inputs:
        - allowed_triggers: '{{ .inputs.allowed_triggers }}'
        - create: '{{ .inputs.create }}'
        - create_async_event_config: '{{ .inputs.create_async_event_config }}'
        - create_qualified_alias_allowed_triggers: '{{ .inputs.create_qualified_alias_allowed_triggers }}'
        - create_qualified_alias_async_event_config: '{{ .inputs.create_qualified_alias_async_event_config }}'
        - create_version_allowed_triggers: '{{ .inputs.create_version_allowed_triggers }}'
        - create_version_async_event_config: '{{ .inputs.create_version_async_event_config }}'
        - description: '{{ .inputs.description }}'
        - destination_on_failure: '{{ .inputs.destination_on_failure }}'
        - destination_on_success: '{{ .inputs.destination_on_success }}'
        - event_source_mapping: '{{ .inputs.event_source_mapping }}'
        - function_name: '{{ .inputs.function_name }}'
        - function_version: '{{ .inputs.function_version }}'
        - maximum_event_age_in_seconds: '{{ .inputs.maximum_event_age_in_seconds }}'
        - maximum_retry_attempts: '{{ .inputs.maximum_retry_attempts }}'
        - name: '{{ .inputs.name }}'
        - refresh_alias: '{{ .inputs.refresh_alias }}'
        - routing_additional_version_weights: '{{ .inputs.routing_additional_version_weights }}'
        - use_existing_alias: '{{ .inputs.use_existing_alias }}'
      outputs:
        - lambda_alias_arn
        - lambda_alias_description
        - lambda_alias_event_source_mapping_function_arn
        - lambda_alias_event_source_mapping_state
        - lambda_alias_event_source_mapping_state_transition_reason
        - lambda_alias_event_source_mapping_uuid
        - lambda_alias_function_version
        - lambda_alias_invoke_arn
        - lambda_alias_name
