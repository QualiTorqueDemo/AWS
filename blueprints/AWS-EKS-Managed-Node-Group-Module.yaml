spec_version: 2
description: |
  Terraform sub-module which creates VPC endpoint resources on AWS.
metadata:
  blueprint-labels:
    - key: hypervisor
      value: AWS
    - key: category
      value: Cloud
    - key: Terraform
inputs:
  create:
    type: string
    default: true
    description: Determines whether resources will be created
  create_security_group:
    type: string
    description: Determines if a security group is created
  endpoints:
    type: string
    default: '{}'
    description: A map of interface and/or gateway endpoints containing their properties and configurations
  security_group_description:
    type: string
    default: 'null'
    description: Description of the security group created
  security_group_ids:
    type: string
    default: '[]'
    description: Default security group IDs to associate with the VPC endpoints
  security_group_name:
    type: string
    default: 'null'
    description: Name to use on security group created. Conflicts with `security_group_name_prefix`
  security_group_name_prefix:
    type: string
    default: 'null'
    description: Name prefix to use on security group created. Conflicts with `security_group_name`
  security_group_rules:
    type: string
    default: '{}'
    description: Security group rules to add to the security group created
  security_group_tags:
    type: string
    default: '{}'
    description: A map of additional tags to add to the security group created
  subnet_ids:
    type: string
    default: '[]'
    description: Default subnets IDs to associate with the VPC endpoints
  timeouts:
    type: string
    default: '{}'
    description: Define maximum timeout for creating, updating, and deleting VPC endpoint resources
  vpc_id:
    type: string
    default: 'null'
    description: The ID of the VPC in which the endpoint will be used
  agent:
    type: agent
outputs:
  vpc-endpoints_endpoints:
    value: '{{ .grains.vpc-endpoints.outputs.endpoints }}'
    quick: true
  vpc-endpoints_security_group_arn:
    value: '{{ .grains.vpc-endpoints.outputs.security_group_arn }}'
    quick: true
  vpc-endpoints_security_group_id:
    value: '{{ .grains.vpc-endpoints.outputs.security_group_id }}'
    quick: true
grains:
  vpc-endpoints:
    kind: terraform
    spec:
      source:
        store: AWS
        path: assets/terraform-aws-vpc-endpoints
      agent:
        name: '{{ .inputs.agent }}'
      env-vars: []
      version: 1.5.5
      inputs:
        - create: '{{ .inputs.create }}'
        - create_security_group: '{{ .inputs.create_security_group }}'
        - endpoints: '{{ .inputs.endpoints }}'
        - security_group_description: '{{ .inputs.security_group_description }}'
        - security_group_ids: '{{ .inputs.security_group_ids }}'
        - security_group_name: '{{ .inputs.security_group_name }}'
        - security_group_name_prefix: '{{ .inputs.security_group_name_prefix }}'
        - security_group_rules: '{{ .inputs.security_group_rules }}'
        - security_group_tags: '{{ .inputs.security_group_tags }}'
        - subnet_ids: '{{ .inputs.subnet_ids }}'
        - tags: '{}'
        - timeouts: '{{ .inputs.timeouts }}'
        - vpc_id: '{{ .inputs.vpc_id }}'
      outputs:
        - endpoints
        - security_group_arn
        - security_group_id
