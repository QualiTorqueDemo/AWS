spec_version: 2
description: |
  Provisions an AWS S3 bucket with the following capabilities:
  - Static web-site hosting
  - Versioning
  - Server-side encryption
  - Lifecycle rules
  - CORS
metadata:
  self-service: true
  display-name: AWS S3 Bucket
  icon:
    path: graphics/S3 Bucket.svg
  blueprint-labels:
    - key: hypervisor
      value: AWS
    - key: category
      value: Cloud
    - key: Terraform
inputs:
  agent:
    type: agent
outputs:
  complete_s3_bucket_website_domain:
    value: https://{{ .grains.complete_s3_bucket.outputs.s3_bucket_website_domain }}
    quick: true
    kind: link
  complete_s3_bucket_website_endpoint:
    value: https://{{ .grains.complete_s3_bucket.outputs.s3_bucket_website_endpoint }}
    quick: true
    kind: link
  complete_s3_bucket_arn:
    value: '{{ .grains.complete_s3_bucket.outputs.s3_bucket_arn }}'
    quick: true
  complete_s3_bucket_bucket_domain_name:
    value: '{{ .grains.complete_s3_bucket.outputs.s3_bucket_bucket_domain_name }}'
    quick: true
  complete_s3_bucket_bucket_regional_domain_name:
    value: '{{ .grains.complete_s3_bucket.outputs.s3_bucket_bucket_regional_domain_name }}'
    quick: true
  complete_s3_bucket_hosted_zone_id:
    value: '{{ .grains.complete_s3_bucket.outputs.s3_bucket_hosted_zone_id }}'
    quick: true
  complete_s3_bucket_id:
    value: '{{ .grains.complete_s3_bucket.outputs.s3_bucket_id }}'
    quick: true
  complete_s3_bucket_lifecycle_configuration_rules:
    value: '{{ .grains.complete_s3_bucket.outputs.s3_bucket_lifecycle_configuration_rules }}'
    quick: true
  complete_s3_bucket_policy:
    value: '{{ .grains.complete_s3_bucket.outputs.s3_bucket_policy }}'
    quick: true
  complete_s3_bucket_region:
    value: '{{ .grains.complete_s3_bucket.outputs.s3_bucket_region }}'
    quick: true
grains:
  complete_s3_bucket:
    kind: terraform
    spec:
      source:
        store: AWS
        path: assets/terraform-aws-s3-bucket
      agent:
        name: '{{ .inputs.agent }}'
      tags:
        auto-tag: true
      inputs: []
      outputs:
        - s3_bucket_arn
        - s3_bucket_bucket_domain_name
        - s3_bucket_bucket_regional_domain_name
        - s3_bucket_hosted_zone_id
        - s3_bucket_id
        - s3_bucket_lifecycle_configuration_rules
        - s3_bucket_policy
        - s3_bucket_region
        - s3_bucket_website_domain
        - s3_bucket_website_endpoint
    tf-version: 1.5.5
