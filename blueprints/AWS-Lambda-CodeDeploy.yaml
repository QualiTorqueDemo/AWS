spec_version: 2
description: |
  Terraform module, which creates Lambda alias as well as AWS CodeDeploy resources required to deploy.
  This Terraform module is the part of serverless.tf framework, which aims to simplify all operations when working with the serverless in Terraform.
  This module can create AWS CodeDeploy application and deployment group, if necessary. If you have several functions, you probably want to create those resources externally, and then set use_existing_deployment_group = true.

  During deployment this module does the following:
  1. Create JSON object with required AppSpec configuration. Optionally, you can store deploy script for debug purposes by setting save_deploy_script = true.
  2. Run aws deploy create-deployment command if create_deployment = true and run_deployment = true was set.
  3. After deployment is created, it can wait for the completion if wait_deployment_completion = true. Be aware, that Terraform will lock the execution and it can fail if it runs for a long period of time. Set this flag for fast deployments (eg, deployment_config_name = "CodeDeployDefault.LambdaAllAtOnce").
metadata:
  blueprint-labels:
    - key: hypervisor
      value: AWS
    - key: category
      value: Cloud
    - key: Terraform
inputs:
  app_name:
    type: string
    description: Name of AWS CodeDeploy application
  function_name:
    type: string
    description: The name of the Lambda function to deploy
  target_version:
    type: string
    description: Target version of Lambda function version to deploy
  after_allow_traffic_hook_arn:
    type: string
    description: ARN of Lambda function to execute after allow traffic during deployment. This function should be named CodeDeployHook_, to match the managed AWSCodeDeployForLambda policy, unless you're using a custom role
  alarm_enabled:
    type: string
    description: Indicates whether the alarm configuration is enabled. This option is useful when you want to temporarily deactivate alarm monitoring for a deployment group without having to add the same alarms again later.
  alarm_ignore_poll_alarm_failure:
    type: string
    description: Indicates whether a deployment should continue if information about the current state of alarms cannot be retrieved from CloudWatch.
  alarms:
    type: string
    default: '[]'
    description: A list of alarms configured for the deployment group. A maximum of 10 alarms can be added to a deployment group.
  alias_name:
    type: string
    description: Name for the alias
  attach_hooks_policy:
    type: string
    default: true
    description: Whether to attach Invoke policy to CodeDeploy role when before allow traffic or after allow traffic hooks are defined.
  attach_triggers_policy:
    type: string
    description: Whether to attach SNS policy to CodeDeploy role when triggers are defined
  auto_rollback_enabled:
    type: string
    default: true
    description: Indicates whether a defined automatic rollback configuration is currently enabled for this Deployment Group.
  auto_rollback_events:
    type: string
    default: |-
      [
        "DEPLOYMENT_STOP_ON_ALARM"
      ]
    description: List of event types that trigger a rollback. Supported types are DEPLOYMENT_FAILURE and DEPLOYMENT_STOP_ON_ALARM.
  aws_cli_command:
    type: string
    default: aws
    description: Command to run as AWS CLI. May include extra arguments like region and profile.
  before_allow_traffic_hook_arn:
    type: string
    description: ARN of Lambda function to execute before allow traffic during deployment. This function should be named CodeDeployHook_, to match the managed AWSCodeDeployForLambda policy, unless you're using a custom role
  codedeploy_principals:
    type: string
    default: |-
      [
        "codedeploy.amazonaws.com"
      ]
    description: List of CodeDeploy service principals to allow. The list can include global or regional endpoints.
  codedeploy_role_name:
    type: string
    description: IAM role name to create or use by CodeDeploy
  create:
    type: string
    default: true
    description: Controls whether resources should be created
  create_app:
    type: string
    description: Whether to create new AWS CodeDeploy app
  create_codedeploy_role:
    type: string
    default: true
    description: Whether to create new AWS CodeDeploy IAM role
  create_deployment:
    type: string
    description: Create the AWS resources and script for CodeDeploy
  create_deployment_group:
    type: string
    description: Whether to create new AWS CodeDeploy Deployment Group
  current_version:
    type: string
    description: Current version of Lambda function version to deploy (can't be $LATEST)
  deployment_config_name:
    type: string
    default: CodeDeployDefault.LambdaAllAtOnce
    description: Name of deployment config to use
  deployment_group_name:
    type: string
    description: Name of deployment group to use
  force_deploy:
    type: string
    description: Force deployment every time (even when nothing changes)
  get_deployment_sleep_timer:
    type: string
    default: 5
    description: Adds additional sleep time to get-deployment command to avoid the service throttling
  interpreter:
    type: string
    default: |-
      [
        "/bin/bash",
        "-c"
      ]
    description: List of interpreter arguments used to execute deploy script, first arg is path
  run_deployment:
    type: string
    description: Run AWS CLI command to start the deployment
  save_deploy_script:
    type: string
    description: Save deploy script locally
  triggers:
    type: string
    default: '{}'
    description: Map of triggers which will be notified when event happens. Valid options for event types are DeploymentStart, DeploymentSuccess, DeploymentFailure, DeploymentStop, DeploymentRollback, DeploymentReady (Applies only to replacement instances in a blue/green deployment), InstanceStart, InstanceSuccess, InstanceFailure, InstanceReady. Note that not all are applicable for Lambda deployments.
  use_existing_app:
    type: string
    description: Whether to use existing AWS CodeDeploy app
  use_existing_deployment_group:
    type: string
    description: Whether to use existing AWS CodeDeploy Deployment Group
  wait_deployment_completion:
    type: string
    description: Wait until deployment completes. It can take a lot of time and your terraform process may lock execution for long time.
  agent:
    type: agent
  description:
    type: string
    description: Description to use for the deployment
outputs:
  deploy_appspec:
    value: '{{ .grains.deploy.outputs.appspec }}'
    quick: true
  deploy_appspec_content:
    value: '{{ .grains.deploy.outputs.appspec_content }}'
    quick: true
  deploy_appspec_sha256:
    value: '{{ .grains.deploy.outputs.appspec_sha256 }}'
    quick: true
  deploy_codedeploy_app_name:
    value: '{{ .grains.deploy.outputs.codedeploy_app_name }}'
    quick: true
  deploy_codedeploy_deployment_group_id:
    value: '{{ .grains.deploy.outputs.codedeploy_deployment_group_id }}'
    quick: true
  deploy_codedeploy_deployment_group_name:
    value: '{{ .grains.deploy.outputs.codedeploy_deployment_group_name }}'
    quick: true
  deploy_codedeploy_iam_role_name:
    value: '{{ .grains.deploy.outputs.codedeploy_iam_role_name }}'
    quick: true
  deploy_deploy_script:
    value: '{{ .grains.deploy.outputs.deploy_script }}'
    quick: true
  deploy_script:
    value: '{{ .grains.deploy.outputs.script }}'
    quick: true
grains:
  deploy:
    kind: terraform
    spec:
      source:
        path: assets/terraform-aws-lambda-deploy
      agent:
        name: '{{ .inputs.agent }}'
      env-vars: []
      version: 1.5.5
      inputs:
        - after_allow_traffic_hook_arn: '{{ .inputs.after_allow_traffic_hook_arn }}'
        - alarm_enabled: '{{ .inputs.alarm_enabled }}'
        - alarm_ignore_poll_alarm_failure: '{{ .inputs.alarm_ignore_poll_alarm_failure }}'
        - alarms: '{{ .inputs.alarms }}'
        - alias_name: '{{ .inputs.alias_name }}'
        - app_name: '{{ .inputs.app_name }}'
        - attach_hooks_policy: '{{ .inputs.attach_hooks_policy }}'
        - attach_triggers_policy: '{{ .inputs.attach_triggers_policy }}'
        - auto_rollback_enabled: '{{ .inputs.auto_rollback_enabled }}'
        - auto_rollback_events: '{{ .inputs.auto_rollback_events }}'
        - aws_cli_command: '{{ .inputs.aws_cli_command }}'
        - before_allow_traffic_hook_arn: '{{ .inputs.before_allow_traffic_hook_arn }}'
        - codedeploy_principals: '{{ .inputs.codedeploy_principals }}'
        - codedeploy_role_name: '{{ .inputs.codedeploy_role_name }}'
        - create: '{{ .inputs.create }}'
        - create_app: '{{ .inputs.create_app }}'
        - create_codedeploy_role: '{{ .inputs.create_codedeploy_role }}'
        - create_deployment: '{{ .inputs.create_deployment }}'
        - create_deployment_group: '{{ .inputs.create_deployment_group }}'
        - current_version: '{{ .inputs.current_version }}'
        - deployment_config_name: '{{ .inputs.deployment_config_name }}'
        - deployment_group_name: '{{ .inputs.deployment_group_name }}'
        - description: '{{ .inputs.description }}'
        - force_deploy: '{{ .inputs.force_deploy }}'
        - function_name: '{{ .inputs.function_name }}'
        - get_deployment_sleep_timer: '{{ .inputs.get_deployment_sleep_timer }}'
        - interpreter: '{{ .inputs.interpreter }}'
        - run_deployment: '{{ .inputs.run_deployment }}'
        - save_deploy_script: '{{ .inputs.save_deploy_script }}'
        - tags: '{}'
        - target_version: '{{ .inputs.target_version }}'
        - triggers: '{{ .inputs.triggers }}'
        - use_existing_app: '{{ .inputs.use_existing_app }}'
        - use_existing_deployment_group: '{{ .inputs.use_existing_deployment_group }}'
        - wait_deployment_completion: '{{ .inputs.wait_deployment_completion }}'
      outputs:
        - appspec
        - appspec_content
        - appspec_sha256
        - codedeploy_app_name
        - codedeploy_deployment_group_id
        - codedeploy_deployment_group_name
        - codedeploy_iam_role_name
        - deploy_script
        - script
